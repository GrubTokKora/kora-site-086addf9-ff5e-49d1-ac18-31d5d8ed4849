    <style>
        :root {
            --footer-bg: #ff6a00;
            --footer-text: rgba(255, 255, 255, 0.96);
            --footer-line: rgba(255, 255, 255, 0.12);
            --footer-muted: rgba(255, 255, 255, 0.9);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            background: var(--footer-bg);
            color: var(--footer-text);
            font-family: 'Montserrat', Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100%;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .footer {
            width: 100%;
            background: var(--footer-bg);
            padding: 36px 22px 28px;
        }

        .footer-inner {
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
            text-align: center;
        }

        .social {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .social a {
            width: 13px;
            height: 13px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-decoration: none;
            opacity: 0.95;
            transition: opacity 0.2s ease;
        }

        .social a:hover {
            opacity: 0.72;
        }

        .social svg {
            width: 100%;
            height: 100%;
            fill: currentColor;
            display: block;
        }

        .brand {
            display: inline-block;
            text-decoration: none;
            margin-bottom: 18px;
        }

        .brand img {
            width: 274px;
            max-width: 100%;
            height: auto;
            display: block;
        }

        .brand svg {
            width: 274px;
            max-width: 100%;
            height: auto;
            display: block;
        }

        .divider {
            width: 100%;
            height: 1px;
            background: var(--footer-line);
            margin: 0 0 22px;
        }

        .info-row {
            display: grid;
            grid-template-columns: 1.4fr 1fr 0.8fr 0.95fr;
            gap: 18px;
            align-items: start;
            text-align: left;
            margin-bottom: 28px;
        }

        .col {
            font-size: 10px;
            line-height: 1.45;
            font-weight: 500;
            letter-spacing: -0.01em;
            color: var(--footer-muted);
        }

        .col a {
            color: inherit;
            text-decoration: none;
        }

        .col a:hover,
        .legal a:hover {
            text-decoration: underline;
        }

        .legal {
            text-align: left;
            font-size: 9px;
            line-height: 1.6;
            color: var(--footer-muted);
        }

        .legal a {
            color: inherit;
            text-decoration: none;
            display: block;
            width: fit-content;
            margin-bottom: 12px;
        }

        .copyright {
            margin-top: 24px;
            margin-bottom: 14px;
        }

        @media (max-width: 640px) {
            .footer {
                padding: 30px 18px 24px;
            }

            .brand img {
                width: 230px;
            }

            .info-row {
                grid-template-columns: 1fr 1fr;
                gap: 14px 20px;
                margin-bottom: 24px;
            }

            .legal {
                text-align: center;
            }

            .legal a {
                margin-left: auto;
                margin-right: auto;
            }
        }
    </style>
</head>
